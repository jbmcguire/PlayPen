name: PlayPen
options:
  bundleIdPrefix: com.boltsystem
packages:
  Markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: 0.4.0
targets:
  PlayPen:
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "27.0"
      macOS: "27.0"
    sources:
      - path: Sources
      - path: Hosted
        type: folder
        buildPhase: resources
    dependencies:
      - package: Markdown
        product: Markdown
    info:
      path: Generated/Info.plist
      properties:
        NSHighResolutionCapable: true
        CFBundleDisplayName: PlayPen
        NSHumanReadableCopyright: ""
        PlayPenHostedServiceURL: $(PLAYPEN_HOSTED_SERVICE_URL)
        CFBundleURLTypes:
          - CFBundleURLName: com.boltsystem.PlayPen
            CFBundleURLSchemes:
              - playpen
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: false
        PLAYPEN_HOSTED_SERVICE_URL: ""
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        "INFOPLIST_KEY_NSPrincipalClass[sdk=macosx*]": NSApplication
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
