<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlayPen HTML Artifact</title>
<style>
  :root {
    color-scheme: light dark;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: Canvas;
    color: CanvasText;
  }

  main {
    width: min(720px, calc(100vw - 32px));
    border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
    border-radius: 8px;
    padding: 24px;
  }

  h1 {
    margin: 0 0 12px;
    font-size: 1.7rem;
  }

  p {
    line-height: 1.55;
  }

  code {
    border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
    border-radius: 4px;
    padding: 2px 5px;
  }
</style>
</head>
<body>
<main>
  <h1>PlayPen HTML Artifact</h1>
  <p>This HTML playground is a local sample for publishing through the hosted mirror.</p>
  <p>After publishing, agents can inspect <code>/meta</code>, <code>/manifest</code>, and <code>/source</code> without executing the rendered page.</p>
</main>
</body>
</html>
